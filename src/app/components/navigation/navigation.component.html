<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="(isHandset$ | async) === false">
    <div class="nav-shell">
      <mat-toolbar class="nav-brand">
        <a routerLink="/home" class="brand-link">
          <span class="brand-kicker">Creative studio</span>
          <span class="brand-title">Deiaco's Developments</span>
        </a>
      </mat-toolbar>

      <mat-nav-list class="nav-list">
        <a mat-list-item routerLink="/home" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
          <span class="nav-label">Home</span>
          <span class="nav-meta">Overview</span>
        </a>

        <a mat-list-item class="nav-group-trigger" (click)="toggleAlgorithms()">
          <span>
            <span class="nav-label">Fractals and Automata</span>
            <span class="nav-meta">Interactive systems</span>
          </span>
          <span class="spacer"></span>
          <mat-icon aria-hidden="false" aria-label="expand icon">{{ showAlgorithms ? 'remove' : 'add' }}</mat-icon>
        </a>

        <div *ngIf="showAlgorithms" class="submenu">
          <a mat-list-item routerLink="/mandelbrot" routerLinkActive="active-link">Mandelbrot</a>
          <a mat-list-item routerLink="/buddhabrot" routerLinkActive="active-link">Buddhabrot</a>
          <a mat-list-item routerLink="/gameoflife" routerLinkActive="active-link">Game of Life</a>
        </div>

        <a mat-list-item routerLink="/photography" routerLinkActive="active-link">
          <span class="nav-label">Photography</span>
          <span class="nav-meta">Light and texture</span>
        </a>

        <a mat-list-item href="https://shadowsofinfinity.io" target="_blank" rel="noopener noreferrer">
          <span class="nav-label">Shadows of Infinity</span>
          <span class="nav-meta">NFT collection</span>
        </a>

        <a mat-list-item routerLink="/bio" routerLinkActive="active-link">
          <span class="nav-label">Bio</span>
          <span class="nav-meta">Background and process</span>
        </a>
      </mat-nav-list>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
